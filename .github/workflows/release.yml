name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension
        run: npm run check

      - name: Install ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

      - name: Sign in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Release to Marketplace, GitHub Packages, and GitHub Releases
        shell: bash
        run: |
          if git tag --list 'v*' | grep -q .; then
            npm run release
          else
            VERSION="0.0.0"
            VSIX="bc-dev-stack-${VERSION}.vsix"

            npx vsce package --out "${VSIX}"
            npx vsce publish --packagePath "${VSIX}"
            oras push "ghcr.io/dam-pav/bc-dev-stack:${VERSION}" \
              --artifact-type application/vnd.microsoft.vscode.extension \
              "${VSIX}:application/vsix"
            gh release create "v${VERSION}" "${VSIX}#Business Central Developer's Stack ${VERSION} VSIX" \
              --title "v${VERSION}" \
              --notes "Initial Business Central Developer's Stack release."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
